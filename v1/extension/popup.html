<!DOCTYPE html>
<html>
<head>
    <title>Transmigrator</title>
</head>
<body>
    <h1>Transmigrator</h1>
    <form id="proxy-form">
        <label for="url">Initial URL:</label>
        <input type="text" id="url" name="url">
        <button type="submit">Fetch Proxies</button>
    </form>
    <div id="proxy-list"></div>
    <script type="module">
        import init, { fetch_proxies } from './pkg/transmigrator.js';

        async function main() {
            await init();
            document.getElementById('proxy-form').addEventListener('submit', async (event) => {
                event.preventDefault();
                const url = document.getElementById('url').value;
                try {
                    fetch_proxies(url, (proxies) => {
                        displayProxies(proxies);
                    });
                } catch (error) {
                    console.error('Error fetching proxies:', error);
                }
            });
        }

        function displayProxies(proxies) {
            const proxyList = document.getElementById('proxy-list');
            proxyList.innerHTML = '';
            proxies.forEach(proxy => {
                const listItem = document.createElement('div');
                listItem.textContent = proxy;
                proxyList.appendChild(listItem);
            });
        }

        main();
    </script>
</body>
</html>
