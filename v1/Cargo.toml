[package]
name = "transmigrator"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "A safety-critical browser and network pair written in Rust"
license = "BUSL-1.1"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.83"
js-sys = "0.3.60"
web-sys = { version = "0.3.60", features = [
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "Window",
] }
rand = { version = "0.8.5", features = ["js"] }
ring = "0.16.20"
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3.33"

[profile.release]
opt-level = "s"
